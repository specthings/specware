name: Publish to PyPI
on:
  push:
    tags:
    - release/*
jobs:
  publish-to-testpypi:
    name: Publish to PyPI
    environment:
      name: pypi
      url: https://pypi.org/p/specware/
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        version: 0.10.7
    - name: Make
      run: make dist
    - name: Publish to PyPI
      run: uv publish --trusted-publishing always
